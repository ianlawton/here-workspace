<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>News Reader</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Theme tokens ────────────────────────────────────────────────── */
    :root {
      --bg:           #f4f4f4;
      --surface:      #ffffff;
      --text:         #111111;
      --text-sec:     #555555;
      --text-muted:   #999999;
      --border:       #e8e8e8;
      --shadow:       rgba(0,0,0,.08);
      --shadow-hover: rgba(0,0,0,.14);
      --placeholder:  #eeeeee;
      --accent:       #d0021b;
    }

    :root.dark {
      --bg:           #111111;
      --surface:      #1e1e1e;
      --text:         #e8e8e8;
      --text-sec:     #aaaaaa;
      --text-muted:   #666666;
      --border:       #2e2e2e;
      --shadow:       rgba(0,0,0,.3);
      --shadow-hover: rgba(0,0,0,.5);
      --placeholder:  #2a2a2a;
      --accent:       #ff3b3b;
    }

    /* ── Layout ──────────────────────────────────────────────────────── */
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: background .2s, color .2s;
    }

    header {
      background: var(--surface);
      border-bottom: 3px solid var(--accent);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      gap: 16px;
      transition: background .2s;
    }

    .brand-name {
      font-size: 16px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--accent);
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* ── Feed tabs ───────────────────────────────────────────────────── */
    .feed-tabs {
      display: flex;
      gap: 4px;
      flex: 1;
    }

    .feed-tab {
      font-size: 12px;
      font-weight: 600;
      padding: 5px 12px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-sec);
      cursor: pointer;
      transition: background .15s, color .15s, border-color .15s;
      white-space: nowrap;
    }

    .feed-tab:hover {
      background: var(--bg);
      color: var(--text);
    }

    .feed-tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .refresh-info { font-size: 11px; color: var(--text-muted); white-space: nowrap; flex-shrink: 0; }

    /* ── Feed ────────────────────────────────────────────────────────── */
    #feed {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ── Cards ───────────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border-radius: 6px;
      box-shadow: 0 1px 3px var(--shadow);
      display: flex;
      gap: 14px;
      padding: 14px;
      cursor: pointer;
      transition: box-shadow .15s, transform .15s, background .2s;
      text-decoration: none;
      color: inherit;
    }

    .card:hover {
      box-shadow: 0 4px 14px var(--shadow-hover);
      transform: translateY(-1px);
    }

    .card-thumb {
      width: 110px;
      height: 72px;
      object-fit: cover;
      border-radius: 4px;
      flex-shrink: 0;
      background: var(--placeholder);
    }

    .card-body {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .card-title {
      font-size: 14px;
      font-weight: 700;
      line-height: 1.35;
      color: var(--text);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-desc {
      font-size: 12px;
      color: var(--text-sec);
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-meta { font-size: 11px; color: var(--text-muted); margin-top: auto; }

    /* ── States ──────────────────────────────────────────────────────── */
    .status {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      gap: 10px;
      font-size: 13px;
    }

    .spinner {
      width: 28px; height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <span class="brand-name">NEWS READER</span>
  <div class="feed-tabs" id="feed-tabs"></div>
  <span class="refresh-info" id="refresh-info">Refreshes every 5 min</span>
</header>

<div id="feed">
  <div class="status"><div class="spinner"></div><span>Loading…</span></div>
</div>

<script>
  const FEEDS = [
    { id: 'nbc',        label: 'NBC News',    url: 'http://feeds.nbcnews.com/feeds/topstories' },
    { id: 'livecharts', label: 'Live Charts', url: 'https://www.livecharts.co.uk/livewire/feed/' },
  ];

  const REFRESH_MS = 5 * 60 * 1000;
  let activeFeedId = FEEDS[0].id;
  let refreshTimer = null;

  // ── Theming ───────────────────────────────────────────────────────────
  function applyScheme(scheme) {
    if (scheme === 'system') scheme = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    document.documentElement.classList.toggle('dark', scheme === 'dark');
  }

  async function initTheme() {
    applyScheme('dark');
    try {
      fin.InterApplicationBus.subscribe({ uuid: '*' }, 'color-scheme', (scheme) => {
        applyScheme(scheme);
      }).then(() => {
        fin.InterApplicationBus.publish('color-scheme-request', null);
        setTimeout(() => fin.InterApplicationBus.publish('color-scheme-request', null), 2000);
      });
    } catch {
      applyScheme(matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    }
  }

  // ── Tabs ──────────────────────────────────────────────────────────────
  function renderTabs() {
    const container = document.getElementById('feed-tabs');
    container.innerHTML = '';
    for (const feed of FEEDS) {
      const btn = document.createElement('button');
      btn.className = 'feed-tab' + (feed.id === activeFeedId ? ' active' : '');
      btn.textContent = feed.label;
      btn.onclick = () => selectFeed(feed.id);
      container.appendChild(btn);
    }
  }

  function selectFeed(id) {
    if (id === activeFeedId) return;
    activeFeedId = id;
    renderTabs();
    clearInterval(refreshTimer);
    loadFeed();
    refreshTimer = setInterval(loadFeed, REFRESH_MS);
  }

  // ── Feed ──────────────────────────────────────────────────────────────
  function timeAgo(dateStr) {
    const diff = Date.now() - new Date(dateStr).getTime();
    const mins = Math.round(diff / 60000);
    if (mins < 1)  return 'Just now';
    if (mins < 60) return `${mins}m ago`;
    const hrs = Math.round(mins / 60);
    if (hrs < 24)  return `${hrs}h ago`;
    return `${Math.round(hrs / 24)}d ago`;
  }

  function getThumb(item) {
    const ns = 'http://search.yahoo.com/mrss/';
    const el = item.getElementsByTagNameNS(ns, 'thumbnail')[0]
            || item.getElementsByTagNameNS(ns, 'content')[0];
    if (el) return el.getAttribute('url');
    const enc = item.querySelector('enclosure');
    if (enc?.getAttribute('type')?.startsWith('image')) return enc.getAttribute('url');
    return null;
  }

  async function loadFeed() {
    const feedEl = document.getElementById('feed');
    const feedCfg = FEEDS.find(f => f.id === activeFeedId);
    const proxyUrl = `http://localhost:8080/rss-proxy?url=${encodeURIComponent(feedCfg.url)}`;
    try {
      feedEl.innerHTML = '<div class="status"><div class="spinner"></div><span>Loading…</span></div>';
      const res  = await fetch(proxyUrl);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const xml  = new DOMParser().parseFromString(await res.text(), 'application/xml');
      const items = Array.from(xml.querySelectorAll('item'));
      if (!items.length) throw new Error('No items in feed');

      feedEl.innerHTML = '';
      for (const item of items) {
        const title   = item.querySelector('title')?.textContent?.trim() ?? '';
        const desc    = item.querySelector('description')?.textContent?.replace(/<[^>]+>/g, '').trim() ?? '';
        const link    = item.querySelector('link')?.textContent?.trim() ?? '#';
        const pubDate = item.querySelector('pubDate')?.textContent?.trim() ?? '';
        const thumb   = getThumb(item);

        const card = document.createElement('a');
        card.className = 'card';
        card.href = link;
        card.target = '_blank';
        card.rel = 'noopener';

        const body = document.createElement('div');
        body.className = 'card-body';
        body.innerHTML = `
          <div class="card-title">${title}</div>
          ${desc ? `<div class="card-desc">${desc}</div>` : ''}
          <div class="card-meta">${pubDate ? timeAgo(pubDate) : ''}</div>`;

        if (thumb) {
          const imgEl = Object.assign(document.createElement('img'), {
            className: 'card-thumb', src: thumb, alt: '', loading: 'lazy',
            onerror() { this.remove(); }
          });
          card.append(imgEl);
        }
        card.append(body);
        feedEl.appendChild(card);
      }

      document.getElementById('refresh-info').textContent =
        `Updated ${new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})} · refreshes every 5 min`;

    } catch (err) {
      feedEl.innerHTML = `<div class="status"><span>⚠ Could not load feed: ${err.message}</span></div>`;
    }
  }

  initTheme();
  renderTabs();
  loadFeed();
  refreshTimer = setInterval(loadFeed, REFRESH_MS);
</script>
</body>
</html>
